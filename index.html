<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NoteSync 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ff758c,#ff7eb3);
  text-align:center;
  color:white;
}
.section{display:none;padding:15px;}
.active{display:block;}
.card{
  background:white;
  color:black;
  margin:10px;
  padding:15px;
  border-radius:15px;
}
input,button{
  padding:8px;
  margin:5px;
  border-radius:8px;
  border:none;
}
button{
  background:#ff4d6d;
  color:white;
  cursor:pointer;
}
#chatBox{
  height:250px;
  overflow-y:auto;
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
  text-align:left;
}
.chatMsg{
  background:#ffe0e6;
  padding:8px;
  border-radius:8px;
  margin:5px 0;
}
.bottomNav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#ff4d6d;
  padding:10px;
  display:flex;
  justify-content:space-around;
}
.bottomNav button{
  background:white;
  color:#ff4d6d;
}
</style>
</head>

<body>

<h2>💖 NoteSync 💖</h2>

<div id="loginDiv">
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>
<button id="loginBtn">Login</button>
</div>

<div id="mainDiv" style="display:none;padding-bottom:70px;">

<div id="home" class="section active">
<div class="card">
<h2>💙 Kumaraswamy ❤️ Pooja 💖</h2>
<p id="onlineStatus"></p>
</div>

<div class="card">
<h3>🎂 Birthdays</h3>
<p id="birthday"></p>
</div>

<div class="card">
<h3>💍 Anniversary</h3>
<p id="anniversaryText"></p>
</div>

<div class="card">
<h3>💞 Days Together</h3>
<p id="daysTogether"></p>
</div>
</div>

<div id="chat" class="section">
<div id="chatBox"></div>
<input type="text" id="messageInput">
<button id="sendBtn">Send</button>
</div>

</div>

<div class="bottomNav" id="navBar" style="display:none;">
<button onclick="showSection('home')">🏠</button>
<button onclick="showSection('chat')">💬</button>
<button id="logoutBtn">🚪</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDEl579k9r9NxIVss_QtQTNLoa25CGGSbI",
  authDomain: "notesync-5e7ed.firebaseapp.com",
  projectId: "notesync-5e7ed",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

// CONNECT ELEMENTS
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const email = document.getElementById("email");
const password = document.getElementById("password");
const loginDiv = document.getElementById("loginDiv");
const mainDiv = document.getElementById("mainDiv");
const navBar = document.getElementById("navBar");
const chatBox = document.getElementById("chatBox");
const messageInput = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");

const birthday = document.getElementById("birthday");
const anniversaryText = document.getElementById("anniversaryText");
const daysTogether = document.getElementById("daysTogether");

// LOGIN
loginBtn.onclick = async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
  } catch (e) {
    alert(e.message);
  }
};

logoutBtn.onclick = () => signOut(auth);

// AUTH
onAuthStateChanged(auth, user => {
  if (user) {
    loginDiv.style.display = "none";
    mainDiv.style.display = "block";
    navBar.style.display = "flex";
    loadChat();
    updateDashboard();
  } else {
    loginDiv.style.display = "block";
    mainDiv.style.display = "none";
    navBar.style.display = "none";
  }
});

// DASHBOARD
const anniversary = new Date("2023-11-25");

function updateDashboard(){
  let days = Math.floor((new Date()-anniversary)/(1000*60*60*24));
  daysTogether.innerHTML = `${days} days`;
}

// CHAT FIXED
sendBtn.onclick = async () => {
  if (!messageInput.value) return;

  sendBtn.disabled = true;

  await addDoc(collection(db,"messages"),{
    text: messageInput.value,
    time: Date.now()
  });

  messageInput.value="";
  sendBtn.disabled=false;
};

messageInput.addEventListener("keypress", e=>{
  if(e.key==="Enter") sendBtn.click();
});

function loadChat(){
  onSnapshot(query(collection(db,"messages"),orderBy("time")), snap=>{
    chatBox.innerHTML="";
    snap.forEach(doc=>{
      chatBox.innerHTML += `<div class="chatMsg">${doc.data().text}</div>`;
    });
  });
}

// NAV
window.showSection=id=>{
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
};

</script>

</body>
</html>
