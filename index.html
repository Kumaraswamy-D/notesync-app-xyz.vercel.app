<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NoteSync 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ff758c,#ff7eb3);
  text-align:center;
  color:white;
}
.section{display:none;padding:15px;}
.active{display:block;}

.card{
  background:white;
  color:black;
  margin:10px;
  padding:15px;
  border-radius:15px;
}

#chatBox{
  height:300px;
  overflow-y:auto;
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
  text-align:left;
}

/* 💬 chat bubbles */
.me{
  text-align:right;
  background:#ff4d6d;
  color:white;
  padding:8px;
  border-radius:10px;
  margin:5px;
}

.other{
  text-align:left;
  background:#eee;
  padding:8px;
  border-radius:10px;
  margin:5px;
}

.bottomNav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#ff4d6d;
  padding:10px;
  display:flex;
  justify-content:space-around;
}

button{
  padding:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>💖 NoteSync 💖</h2>

<div id="loginDiv">
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>
<button id="loginBtn">Login</button>
</div>

<div id="mainDiv" style="display:none;padding-bottom:70px;">

<div id="chat" class="section active">
<div id="chatBox"></div>
<input type="text" id="messageInput" placeholder="Type message">
<button id="sendBtn">Send</button>
</div>

</div>

<div class="bottomNav" id="navBar" style="display:none;">
<button id="logoutBtn">Logout</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDEl579k9r9NxIVss_QtQTNLoa25CGGSbI",
  authDomain: "notesync-5e7ed.firebaseapp.com",
  projectId: "notesync-5e7ed",
  storageBucket: "notesync-5e7ed.firebasestorage.app",
  messagingSenderId: "486342879531",
  appId: "1:486342879531:web:76ed522f873d1ecca67d6e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

// USERS
const users = {
  "kumaraswamyd2005@gmail.com": "Kumaraswamy 💙",
  "poojaprasanna089@gmail.com": "Pooja 💖"
};

// ELEMENTS
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const email = document.getElementById("email");
const password = document.getElementById("password");
const loginDiv = document.getElementById("loginDiv");
const mainDiv = document.getElementById("mainDiv");
const navBar = document.getElementById("navBar");
const chatBox = document.getElementById("chatBox");
const messageInput = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");

// LOGIN
loginBtn.onclick = async ()=>{
  try{
    await signInWithEmailAndPassword(auth,email.value,password.value);
  }catch(e){
    alert(e.message);
  }
};

// LOGOUT
logoutBtn.onclick = ()=> signOut(auth);

// AUTH STATE
onAuthStateChanged(auth,user=>{
  if(user){
    loginDiv.style.display="none";
    mainDiv.style.display="block";
    navBar.style.display="flex";
    loadChat();
  }else{
    loginDiv.style.display="block";
  }
});

// SEND MESSAGE
sendBtn.onclick = async ()=>{
  if(!messageInput.value) return;

  await addDoc(collection(db,"messages"),{
    text: messageInput.value,
    email: auth.currentUser.email,
    name: users[auth.currentUser.email] || "Unknown",
    time: serverTimestamp()
  });

  messageInput.value="";
};

// ENTER KEY
messageInput.addEventListener("keypress", e=>{
  if(e.key==="Enter") sendBtn.click();
});

// LOAD CHAT
function loadChat(){
  onSnapshot(query(collection(db,"messages"),orderBy("time","asc")), snap=>{
    chatBox.innerHTML="";

    snap.forEach(doc=>{
      let m = doc.data();

      let cls = (m.email === auth.currentUser.email) ? "me" : "other";

      chatBox.innerHTML += `
        <div class="${cls}">
          <b>${m.name}</b><br>
          ${m.text}
        </div>
      `;
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

</script>

</body>
</html>
