<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NoteSync 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ff758c,#ff7eb3);
  text-align:center;
  color:white;
}
.section{display:none;padding:15px;}
.active{display:block;}

.card{
  background:white;
  color:black;
  margin:10px;
  padding:15px;
  border-radius:15px;
}

#chatBox{
  height:250px;
  overflow-y:auto;
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
  text-align:left;
}

.me{
  background:#ff4d6d;
  color:white;
  padding:8px;
  border-radius:10px;
  margin:5px;
  text-align:right;
}

.other{
  background:#eee;
  padding:8px;
  border-radius:10px;
  margin:5px;
  text-align:left;
}

.bottomNav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#ff4d6d;
  padding:10px;
  display:flex;
  justify-content:space-around;
}

button{
  padding:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>💖 NoteSync 💖</h2>

<div id="loginDiv">
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>
<button id="loginBtn">Login</button>
</div>

<div id="mainDiv" style="display:none;padding-bottom:70px;">

<div id="home" class="section active">
<div class="card">
<h2>💙 Kumaraswamy ❤️ Pooja 💖</h2>
<p id="onlineStatus"></p>
</div>
</div>

<div id="chat" class="section">
<div id="chatBox"></div>
<input type="text" id="messageInput" placeholder="Type message">
<button id="sendBtn">Send</button>
</div>

<div id="dates" class="section">
<div class="card">
<input type="text" id="eventTitle" placeholder="Event">
<input type="date" id="eventDate">
<button onclick="addEvent()">Add</button>
<div id="eventList"></div>
</div>
</div>

<div id="celebration" class="section">
<div class="card">
<button onclick="cutCake()">🎂 Cut Cake</button>
<p id="celebrateMsg"></p>
</div>
</div>

<div id="secret" class="section">
<div class="card">
<input type="text" id="secretInput">
<button onclick="addSecret()">Save</button>
<div id="secretList"></div>
</div>
</div>

</div>

<div class="bottomNav" id="navBar" style="display:none;">
<button onclick="showSection('home')">🏠</button>
<button onclick="showSection('chat')">💬</button>
<button onclick="showSection('dates')">📅</button>
<button onclick="showSection('celebration')">🎉</button>
<button onclick="showSection('secret')">💌</button>
<button id="logoutBtn">🚪</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, setDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDEl579k9r9NxIVss_QtQTNLoa25CGGSbI",
  authDomain: "notesync-5e7ed.firebaseapp.com",
  projectId: "notesync-5e7ed",
  storageBucket: "notesync-5e7ed.firebasestorage.app",
  messagingSenderId: "486342879531",
  appId: "1:486342879531:web:76ed522f873d1ecca67d6e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

const users={
"kumaraswamyd2005@gmail.com":"Kumaraswamy 💙",
"poojaprasanna089@gmail.com":"Pooja 💖"
};

let unsubscribeChat = null;

// ELEMENTS
const loginBtn=document.getElementById("loginBtn");
const logoutBtn=document.getElementById("logoutBtn");
const email=document.getElementById("email");
const password=document.getElementById("password");
const loginDiv=document.getElementById("loginDiv");
const mainDiv=document.getElementById("mainDiv");
const navBar=document.getElementById("navBar");

const chatBox=document.getElementById("chatBox");
const messageInput=document.getElementById("messageInput");
const sendBtn=document.getElementById("sendBtn");

const onlineStatus=document.getElementById("onlineStatus");

// LOGIN
loginBtn.onclick=async()=>{
  try{
    await signInWithEmailAndPassword(auth,email.value,password.value);
  }catch(e){ alert(e.message); }
};

logoutBtn.onclick=()=>signOut(auth);

// AUTH
onAuthStateChanged(auth,user=>{
if(user){

loginDiv.style.display="none";
mainDiv.style.display="block";
navBar.style.display="flex";

// ONLINE STATUS
setDoc(doc(db,"status",user.uid),{email:user.email,online:true});

loadChat();

}else{
loginDiv.style.display="block";
mainDiv.style.display="none";
navBar.style.display="none";
}
});

// CHAT SEND FIX
sendBtn.onclick=async()=>{
if(!messageInput.value.trim()) return;

sendBtn.disabled=true;

await addDoc(collection(db,"messages"),{
text:messageInput.value,
email:auth.currentUser.email,
name:users[auth.currentUser.email] || "Unknown",
time:serverTimestamp(),
seen:false
});

messageInput.value="";
sendBtn.disabled=false;
};

// CHAT LOAD FIX (NO DUPLICATE)
function loadChat(){

// remove old listener
if(unsubscribeChat){
unsubscribeChat();
}

unsubscribeChat = onSnapshot(
query(collection(db,"messages"),orderBy("time","asc")),
async snap=>{

chatBox.innerHTML="";

for(const d of snap.docs){
let m=d.data();

// mark seen
if(m.email!==auth.currentUser.email && !m.seen){
await updateDoc(doc(db,"messages",d.id),{seen:true});
}

let cls=(m.email===auth.currentUser.email)?"me":"other";

chatBox.innerHTML+=`
<div class="${cls}">
<b>${m.name || "Unknown"}</b><br>
${m.text}
${m.email===auth.currentUser.email ? (m.seen?" ✔✔":" ✔") : ""}
</div>`;
}

chatBox.scrollTop=chatBox.scrollHeight;
});
}

// NAV
window.showSection=id=>{
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
};

</script>

</body>
</html>
